name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore KeySwitcher.slnx

      - name: Build
        run: dotnet build KeySwitcher.slnx -c Release --no-restore

      - name: Publish (win-x64)
        run: >
          dotnet publish KeySwitcher/KeySwitcher.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:DebugType=None
          -p:DebugSymbols=false
          -o artifacts/keyswitcher-win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyswitcher-win-x64
          path: artifacts/keyswitcher-win-x64/**
          if-no-files-found: error
          retention-days: 14
